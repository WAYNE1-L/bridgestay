# Zeabur Configuration
# https://docs.zeabur.com/

# Static site configuration
type: static

# Build configuration
build:
  command: npm run build
  output: dist

# Environment variables
env:
  NODE_VERSION: "20"

# Security headers via Caddyfile
caddyfile: |
  {
    # Global options
    auto_https off
    log {
      output stdout
      format console
    }
  }

  :80 {
    # Security headers
    header {
      # Content Security Policy
      Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.sentry.io https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
      
      # HTTP Strict Transport Security
      Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
      
      # X-Frame-Options
      X-Frame-Options "DENY"
      
      # X-Content-Type-Options
      X-Content-Type-Options "nosniff"
      
      # Referrer Policy
      Referrer-Policy "strict-origin-when-cross-origin"
      
      # Permissions Policy
      Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), speaker=()"
      
      # Remove server header
      -Server
    }

    # Serve static files
    root * /srv
    file_server

    # SPA fallback
    try_files {path} /index.html

    # Cache static assets
    @static {
      path /assets/*
    }
    header @static Cache-Control "public, max-age=31536000, immutable"

    # Cache service worker
    @sw {
      path /sw.js
    }
    header @sw Cache-Control "public, max-age=0, must-revalidate"
  }
