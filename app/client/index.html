<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Bridge Stay | Your First Home in the US</title>    
    <!-- Typography: Poppins + Nunito + Playfair Display (serif for logo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: only loaded when Vite has replaced both env vars.
         If either placeholder is still a literal %…% string (local dev
         without the vars set), the script tag is never injected so no
         malformed-URI errors pollute the console. -->
    <script>
      (function () {
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (
          !endpoint || endpoint.charAt(0) === "%" ||
          !websiteId || websiteId.charAt(0) === "%"
        ) return;
        var s = document.createElement("script");
        s.defer = true;
        s.src = endpoint + "/umami";
        s.setAttribute("data-website-id", websiteId);
        document.head.appendChild(s);
      })();
    </script>
  </body>

</html>
